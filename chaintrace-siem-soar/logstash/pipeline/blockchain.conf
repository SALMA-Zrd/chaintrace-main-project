input {
  http {
    port => 5000
    codec => json
  }
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # 1. Gestion des certificats invalides
  if [certStatus] == "REVOKED" or [certStatus] == "SUSPENDED" or [certStatus] == "INVALID" {
    mutate {
      add_field => {
        "anomaly_type" => "CERT_INVALIDE"
        "severity" => "HIGH"
        "alert" => "true"
        "message_fr" => "Certificat invalide ou révoqué détecté"
      }
    }
  }

  # 2. Détection des erreurs d'accès ou de rôle
  if [error] =~ /refuse/ or [error] =~ /role/ or [error] =~ /Accès refusé/ {
    mutate {
      add_field => {
        "anomaly_type" => "ACCES_SANS_ROLE"
        "severity" => "HIGH"
        "alert" => "true"
        "message_fr" => "Tentative d'accès sans rôle valide"
      }
    }
  }

  # 3. Comparaison stricte en chaîne de caractères pour le booléen riskFlag
  if [riskFlag] == "true" {
    mutate {
      add_field => {
        "anomaly_type" => "RISK_FLAG"
        "severity" => "CRITICAL"
        "alert" => "true"
        "message_fr" => "RiskFlag détecté dans Employ"
      }
    }
  }

  # 4. Score de qualité
  if [qualityStatus] == "FAIL" {
    mutate {
      add_field => {
        "anomaly_type" => "QUALITY_FAIL"
        "severity" => "MEDIUM"
        "alert" => "true"
        "message_fr" => "Score qualité insuffisant"
      }
    }
  }

  # 5. Comparaison stricte en chaîne de caractères pour l'alerte carbone
  if [carbonAlert] == "true" {
    mutate {
      add_field => {
        "anomaly_type" => "CARBON_ALERT"
        "severity" => "MEDIUM"
        "alert" => "true"
        "message_fr" => "Alerte carbone NIST dépassée"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "blockchain-logs-%{+YYYY.MM.dd}"
  }
  if [alert] == "true" {
    http {
      url => "http://172.17.0.1:5678/webhook-test/blockchain-alert"
      http_method => "post"
      format => "json"
    }
  }
  stdout { codec => rubydebug }
}

